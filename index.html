<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WXinfo - Tabela Meteorológica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>WXinfo - Consulta Meteorológica</h1>
    <div id="search-container">
        <label for="airport-input">Aeroportos (código ICAO, separados por vírgula ou espaço):</label>
        <div class="input-row">
            <input
                type="text"
                id="airport-input"
                placeholder="Ex: SBGR, SBSP, SBBE"
                autocomplete="off"
                spellcheck="false"
            />
            <button id="search-btn">Buscar</button>
        </div>
        <p class="hint">Exemplos: SBGR SBSP SBBE SBRJ SBCF — você pode digitar vários aeroportos ao mesmo tempo.</p>
    </div>
    <div id="tables-container"></div>
    <script src="script.js"></script>
</body>
</html>
